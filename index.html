<!DOCTYPE html>
<html>
<head>
  <title>UPMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="auth-page" class="center">
  <h2>UPMS Login</h2>
  <input id="auth-email" placeholder="Gmail">
  <input id="auth-pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Create Account</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <div id="sidebar">
    <h2>UPMS</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('myEvents')">My Events</button>
    <button onclick="showPage('create')">Create Event</button>
    <button onclick="showPage('notifications')">Notifications</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div id="topbar">
      <span onclick="openProfile()">👤</span>
    </div>

    <div id="dashboard" class="page"></div>
    <div id="myEvents" class="page hidden"></div>

    <div id="create" class="page hidden">
      <h3>Create Event</h3>
      <input id="title" placeholder="Title">
      <input id="date" type="date">
      <input id="time" type="time">
      <textarea id="desc" placeholder="Description"></textarea>
      <textarea id="reqs" placeholder="Requirements"></textarea>
      <button onclick="createEvent()">Create</button>
    </div>

    <div id="notifications" class="page hidden"></div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal hidden">
  <div class="box">
    <span class="close" onclick="closeModal('profileModal')">X</span>
    <h3>Profile</h3>
    <input id="pName">
    <input id="pBirth" type="date">
    <input id="pAge" disabled>
    <textarea id="pBio"></textarea>
    <div id="schedule"></div>
    <button onclick="saveProfile()">Save</button>
  </div>
</div>

<!-- EVENT MODAL -->
<div id="eventModal" class="modal hidden">
  <div class="box">
    <span class="close" onclick="closeModal('eventModal')">X</span>
    <h3 id="eventTitle"></h3>
    <p id="eventDesc"></p>

    <button id="joinBtn"></button>

    <h4>Participants</h4>
    <div id="participants"></div>

    <h4>Requests</h4>
    <div id="requests"></div>

    <h4>Chat</h4>
    <div id="chatBox"></div>
    <input id="chatInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
