<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Participation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <h2>School Portal</h2>
            <ul>
                <li onclick="UI.showDashboard()">Dashboard</li>
                <li onclick="UI.showEventCreation()">Create Event</li>
                <li onclick="UI.showProfile()">Profile</li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Login/Register -->
            <section id="auth-section">
                <h2>Login / Register</h2>
                <form id="auth-form">
                    <input type="text" id="name" placeholder="Full Name" required>
                    <input type="text" id="department" placeholder="Department" required>
                    <select id="role">
                        <option value="Member">Member</option>
                        <option value="Organizer">Event Creator</option>
                    </select>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login / Register</button>
                </form>
            </section>

            <!-- Dashboard -->
            <section id="dashboard" class="hidden">
                <h2>Dashboard</h2>
                <div id="event-list" class="card-container"></div>
            </section>

            <!-- Event Creation -->
            <section id="event-creation" class="hidden">
                <h2>Create Event</h2>
                <form id="create-event-form">
                    <input type="text" id="event-title" placeholder="Event Title" required>
                    <textarea id="event-desc" placeholder="Event Description"></textarea>
                    <textarea id="event-req" placeholder="Event Requirements"></textarea>
                    <input type="datetime-local" id="event-datetime" required>
                    <input type="text" id="event-org" placeholder="Organization (Optional)">
                    <button type="submit">Create Event</button>
                </form>
            </section>

            <!-- Event Details / Chat -->
            <section id="event-details" class="hidden">
                <button onclick="UI.backToDashboard()">← Back</button>
                <h2 id="detail-title"></h2>
                <p id="detail-desc"></p>
                <p id="detail-req"></p>
                <p><strong>Organizer:</strong> <span id="detail-organizer"></span></p>
                <p><strong>Participants:</strong> <span id="detail-participants"></span></p>

                <button id="join-event-btn" onclick="UI.requestJoinEvent()">Join Event</button>

                <div id="chat-section">
                    <h3>Event Chat</h3>
                    <div id="chat-messages" class="chat-box"></div>
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button onclick="UI.sendMessage()">Send</button>
                </div>

                <div id="join-requests" class="hidden">
                    <h3>Join Requests</h3>
                    <div id="request-list"></div>
                </div>
            </section>

            <!-- Profile -->
            <section id="profile" class="hidden">
                <h2>Profile</h2>
                <p><strong>Name:</strong> <span id="profile-name"></span></p>
                <p><strong>Department:</strong> <span id="profile-dept"></span></p>
                <p><strong>Role:</strong> <span id="profile-role"></span></p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
